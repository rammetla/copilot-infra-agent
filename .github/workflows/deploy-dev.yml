name: Deploy Infrastructure (Dev)

on:
  workflow_dispatch:
    inputs:
      resource_type:
        description: "Type of resource (e.g., virtual-machine)"
        required: true
      variables_json:
        description: "Terraform variables as JSON"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Initialize
        run: |
          cd environments/dev
          terraform init

      - name: Terraform Validate
        run: |
          cd environments/dev
          terraform validate

      - name: Create Variables File
        run: |
          echo '${{ github.event.inputs.variables_json }}' > /tmp/override.json

      - name: Terraform Plan
        id: plan
        run: |
          cd environments/dev
          terraform plan -var-file="terraform.tfvars" -var-file="/tmp/override.json" -out=tfplan

      - name: Terraform Apply
        run: |
          cd environments/dev
          terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        run: |
          cd environments/dev
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Upload Results
        uses: actions/upload-artifact@v3
        with:
          name: deployment-results
          path: environments/dev/tfplan
