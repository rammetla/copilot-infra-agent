name: Deploy Infrastructure (Dev)

on:
  workflow_dispatch:
    inputs:
      resource_type:
        description: "Type of resource (e.g., virtual-machine)"
        required: true
      variables_json:
        description: "Terraform variables as JSON"
        required: true

env:
  TERRAFORM_VERSION: 1.5.0
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Initialize
        run: |
          cd terraform-example/environments/dev
          terraform init

      - name: Terraform Validate
        run: |
          cd terraform-example/environments/dev
          terraform validate

      - name: Create Variables File
        run: |
          echo '${{ github.event.inputs.variables_json }}' > /tmp/override.json

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform-example/environments/dev
          terraform plan -var-file="terraform.tfvars" -var-file="/tmp/override.json" -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform-example/environments/dev
          terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        run: |
          cd terraform-example/environments/dev
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: terraform-example/environments/dev/tfplan
