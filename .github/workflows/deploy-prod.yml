name: Deploy Infrastructure (Production)

on:
  workflow_dispatch:
    inputs:
      resource_type:
        description: "Type of resource to deploy (e.g., virtual-machine)"
        required: true
        default: "virtual-machine"
      variables_json:
        description: "Terraform variables as JSON"
        required: true

env:
  TERRAFORM_VERSION: 1.5.0
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      plan_status: ${{ steps.plan.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Initialize
        run: |
          cd terraform-example/environments/prod
          terraform init

      - name: Create Terraform Variables File
        run: |
          mkdir -p /tmp/tfvars
          echo '${{ github.event.inputs.variables_json }}' > /tmp/tfvars/override.json

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform-example/environments/prod
          terraform plan -var-file="terraform.tfvars" -var-file="/tmp/tfvars/override.json" -out=tfplan 2>&1 | tee plan_output.txt
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create PR with Plan for Review
        uses: actions/github-script@v6
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.PLAN_OUTPUT }}`;
            
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Deploy ${{ github.event.inputs.resource_type }} to prod`,
              head: context.ref,
              base: 'main',
              body: `## ⛔ PRODUCTION DEPLOYMENT ALERT ⛔\n\n### Resource Type: ${{ github.event.inputs.resource_type }}\n\n**REQUIRES MANDATORY APPROVAL FROM INFRASTRUCTURE TEAM**\n\nPlan Preview:\n\`\`\`\n${planOutput}\n\`\`\`\n\nReviewers: Please verify all changes before approving.`
            });

      - name: Save Plan for Apply Job
        run: |
          cd terraform-example/environments/prod
          mkdir -p /tmp/plans
          cp tfplan /tmp/plans/tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod
          path: terraform-example/environments/prod/tfplan

  apply:
    needs: plan
    runs-on: ubuntu-latest
    if: needs.plan.outputs.plan_status == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-prod
          path: terraform-example/environments/prod

      - name: Terraform Initialize
        run: |
          cd terraform-example/environments/prod
          terraform init

      - name: Manual Approval Required
        run: |
          echo "⛔ PRODUCTION DEPLOYMENT PENDING"
          echo "This deployment requires manual approval from the infrastructure team"
          echo "Check the associated Pull Request for approval status"

      - name: Apply Terraform
        run: |
          cd terraform-example/environments/prod
          terraform apply tfplan

      - name: Output Results
        run: |
          cd terraform-example/environments/prod
          terraform output -json
        if: success()

      - name: Notify Deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **PRODUCTION DEPLOYMENT COMPLETED**\n\nResource type: ${{ github.event.inputs.resource_type }}\n\nPlease monitor the deployed resources.`
            });
        if: success()
